# 粮食应急物流案例库管理系统的设计与实现
## 技术框架
粮食应急物流案例库管理系统的设计与实现
本系统采用java技术开发,数据库采用Mysql 8.0。

后端技术框架: SpringBoot框架、Vue3、B/S架构
数据库工具: Navicat16
JDK版本: JDK8
服务器: Tomcat9.0
开发软件: IntelliJ IDEA 2024、 Visual Studio Code、 Maven3.9.5
开发浏览器: chrome谷歌浏览器
后台路径地址：localhost:8889
前台路径地址：localhost:8888 （无前台不需要输入）
如果您想对系统多一些了解，一定要去看系统讲解视频哦！
java后端讲解链接：<mark>**[点击下载](http://47.122.78.74:3000/后端java代码讲解.zip)**<mark>
一键项目部署工具以及对应的讲解视频:  <mark>**[点击此处查看详情](http://47.122.78.74:3000/)**<mark>
## 关系模型
案例类型(主键,名称,创建时间)
案例管理(主键,标题,事件类型,粮食调运方案,物流过程,处置效果,封面,创建人id,创建人名称,涉及人员,案例描述,详情图,发生时间,地区,粮食品种,创建时间)

文本消息内容表(文本消息ID,文本消息,创建时间,更新时间)
